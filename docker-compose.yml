services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Helsinki
      - TZ=Europe/Helsinki
      - N8N_SECURE_COOKIE=false
      - N8N_BLOCK_ENV_ACCESS_IN_CODE=false
      - N8N_BLOCK_FILE_ACCESS_IN_CODE=false
      - N8N_RUNNERS_TASK_TIMEOUT=1800
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=300
      - N8N_RUNNERS_MAX_OLD_SPACE_SIZE=4096
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
      - NODE_OPTIONS=--max-old-space-size=4096
      - PIPELINE_BOT_TOKEN=${PIPELINE_BOT_TOKEN}
      - PIPELINE_CHAT_ID=${PIPELINE_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - /srv/transcribe/pipeline_done:/data/pipeline_done

    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  n8n_data:
